  /user-feeds/{id}/stats:
    get:
      tags:
        - user-feed
      summary: Aggregate user-feed statistics by time bucket
      description: |
        Returns a paginated list of time-bucketed rollups for the specified user feed. Each item includes interval bounds
        (UTC), optional raw **sentiment** triples and/or **sentimentDistribution** (normalized shares + **range95** / **stdError**), and per-**emotion**
        rollups. Query **`sentimentStats`** selects the representation (default **`normalized`**)—same semantics as platform
        combined stats.

        Bucket boundaries are controlled by **granularity** (`HOUR`, `DAY`, `WEEK`, `MONTH`, or `LIFETIME`). Use optional
        **from** and **to** (`date-time`) to limit the window; use **limit** and **offset** to page through intervals.
      operationId: getUserFeedStats
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the user feed. May be any unique string — not required to be a UUID.
          schema:
            type: string
          example: my-unique-feed-id-456
        - name: granularity
          in: query
          required: false
          description: Size of each statistical interval (UTC bucket boundaries). When omitted, defaults to your tier’s configured granularity.
          schema:
            $ref: '#/components/schemas/StatGranularity'
          example: DAY
        - name: sentimentStats
          in: query
          required: false
          description: Same as `GET /platform-feeds/{id}/stats` (default **`normalized`**).
          schema:
            $ref: '#/components/schemas/SentimentStatsMode'
          example: normalized
        - name: from
          in: query
          required: false
          description: |
            Inclusive start of the query window (ISO-8601 `date-time`, UTC recommended; a calendar date `YYYY-MM-DD`
            alone is interpreted as 00:00:00 UTC that day). Omit to begin at the oldest
            available data. After plan limits, the server aligns the window to **granularity** UTC buckets: snapped to
            bucket start, then clamped up to the policy floor if the snap would cross it. **LIFETIME** skips this bucket
            expansion.
          schema:
            type: string
            format: date-time
          example: "2025-04-01T00:00:00Z"
        - name: to
          in: query
          required: false
          description: |
            Exclusive end of the query window (half-open interval). A calendar date `YYYY-MM-DD` alone is interpreted as
            00:00:00 UTC that day. Omit to use the latest available data. After plan
            limits, may expand to the next UTC bucket boundary for **granularity** unless capped by policy (e.g. current
            time for non-admin). **LIFETIME** skips this expansion. `WEEK` = Monday 00:00 UTC; `MONTH` = first calendar day
            00:00 UTC.
          schema:
            type: string
            format: date-time
          example: "2025-04-08T00:00:00Z"
        - name: limit
          in: query
          required: false
          description: Maximum number of interval rows to return per page
          schema:
            type: integer
            format: int64
            default: 5
          example: 10
        - name: offset
          in: query
          required: false
          description: Number of interval rows to skip before returning results
          schema:
            type: integer
            format: int64
            default: 0
          example: 0
      responses:
        '200':
          description: Paginated list of combined sentiment and emotion rollups per interval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultPageListFeedIntervalStats'
              example:
                data:
                  - interval:
                      from: "2025-04-07T00:00:00Z"
                      to: "2025-04-08T00:00:00Z"
                    sentimentDistribution:
                      basis: OK
                      positive:
                        share: 0.41
                        range95:
                          low: 0.37
                          high: 0.45
                        stdError: 0.0204
                        sampleCount: 220
                      negative:
                        share: 0.19
                        range95:
                          low: 0.15
                          high: 0.23
                        stdError: 0.0204
                        sampleCount: 95
                      neutral:
                        share: 0.40
                        range95:
                          low: 0.36
                          high: 0.44
                        stdError: 0.0204
                        sampleCount: 197
                    emotions:
                      - emotion: HAPPINESS
                        avgScore: 0.61
                        variance: 0.04
                        sampleCount: 48
                        segmentCount: 1
                      - emotion: ANGER
                        avgScore: 0.11
                        variance: 0.02
                        sampleCount: 12
                        segmentCount: 1
                errors: []
                metadata:
                  currentOffset: 0
                  totalCount: 14

