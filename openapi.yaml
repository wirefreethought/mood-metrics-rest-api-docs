openapi: 3.1.0
info:
  title: Mood Metrics API
  description: |
    The Mood Metrics API provides powerful sentiment analysis on submitted text, with optional long-term tracking and anomaly detection using feed IDs. Perfect for monitoring brand perception, social media streams, customer feedback, support tickets, or real-time news sentiment.

    <ul>
      <li>Sentiment classification
      <li>Intent classification
      <li>Confidence scores (0.0 – 1.0) for each primary emotion</li>
      <li>Language-agnostic – works with any UTF-8 text</li>
      <li>RESTful design with predictable resource-oriented URLs</li>
      <li>Secure, scalable, cloud-backed infrastructure</li>
    </ul>

    <hr/>

    <h3>Useful Resources</h3>
    <ul>
      <li><a href="http://wirefreethought.com/terms-of-service">API Terms of Service</a></li>
      <li>Contact: <a href="mailto:info@mood-metrics-api.dev">info@mood-metrics-api.dev</a></li>
    </ul>

  version: v1.0.0
  x-logo:
    url: logo.png
    backgroundColor: "#FFFFFF"

servers:
  - url: https://mood-metrics.p.rapidapi.com
    description: Production API endpoint (via RapidAPI)

tags:
  - name: analysis
    description: Standalone sentiment analysis (`/analyses`)
  - name: encryption
    description: Encryption key and certificate material
  - name: job
    description: Asynchronous processing jobs
  - name: platform-feed
    description: Platform-scoped feeds (`/platform-feeds`) and related analyses and statistics
  - name: user-feed
    description: User-scoped feeds (`/user-feeds`) and related analyses and statistics
  - name: usage
    description: |
      Usage and plan limits for feed consumption and paging (`/usage/limits/...`, including `/usage/limits/paging`).
      **Authentication is optional**; without credentials or tier-resolving headers, values reflect **deployment
      defaults** from the default access policy.

paths:
  /analyses:
    post:
      tags:
        - analysis
      summary: Submit text for sentiment analysis
      description: |
        Submits text for sentiment analysis.

        Behavior is controlled by the **X-WFT-Async-Mode** header:

        - `true` (default): Processing is asynchronous. The API immediately returns a job ID. Use the job endpoints to monitor progress and retrieve results when complete.
        - `false`: Processing is synchronous. The API waits for the analysis to complete and returns the final sentiment analysis result in the same shape as `GET /analyses/{id}`.
      operationId: analyzeTextAsync
      parameters:
        - name: X-WFT-Async-Mode
          in: header
          description: Controls whether the request is processed asynchronously (`true`, default) or synchronously (`false`).
          schema:
            $ref: '#/components/schemas/AsyncModeHeaderValue'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeTextRequest'
            examples:
              single:
                summary: Analyze a single piece of text (async)
                value:
                  text: "I absolutely love this product! It's the best thing ever!"
      responses:
        '200':
          description: Analysis job created or completed result returned, depending on async mode
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/WftWsResultSentimentAnalysisVoid'
                  - $ref: '#/components/schemas/WftWsResultPayloadSentimentAnalysisJobMetadata'
              examples:
                async:
                  summary: Asynchronous mode (X-WFT-Async-Mode=true or omitted)
                  value:
                    data:
                      jobId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    errors: []
                sync:
                  summary: Synchronous mode (X-WFT-Async-Mode=false)
                  value:
                    data:
                      intent: PRAISE
                      intentScore: 0.9
                      sentiment: VERY_POSITIVE
                      sentimentScore: 0.94
                      emotionScores:
                        - emotion: HAPPINESS
                          score: 0.97
                        - emotion: SURPRISE
                          score: 0.41
                        - emotion: NEUTRAL
                          score: 0.02
                      rationale: Strong positive indicators including words like 'love', 'best', 'amazing'
                    errors: []

  /analyses/{id}:
    get:
      tags:
        - analysis
      summary: Retrieve completed sentiment analysis result
      description: |
        Fetches the final sentiment analysis result using the result ID obtained from a completed job.
        Includes overall sentiment, score, emotion breakdown, and rationale.
      operationId: getSentimentAnalysis
      parameters:
        - name: id
          in: path
          required: true
          description: Result ID (UUID) from a SUCCEEDED sentiment analysis job
          schema:
            type: string
          example: a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8
      responses:
        '200':
          description: Completed sentiment analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultSentimentAnalysisVoid'
              example:
                data:
                  sentiment: VERY_POSITIVE
                  sentimentScore: 0.94
                  emotionScores:
                    - emotion: HAPPINESS
                      score: 0.97
                    - emotion: SURPRISE
                      score: 0.41
                    - emotion: NEUTRAL
                      score: 0.02
                  rationale: Strong positive indicators including words like 'love', 'best', 'amazing'
                errors: []

  /platform-feeds:
    get:
      tags:
        - platform-feed
      summary: List platform feeds
      description: |
        Returns a paginated list of all platform-scoped feeds. When **`sort`** is omitted, results are ordered by feed
        **`name`** ascending, then **`id`** ascending.

        Supports pagination via `limit` and `offset`, and sorting via the `sort` parameter (allowed fields: `name`, `id`).
      operationId: listPlatformFeeds
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of feeds to return per page
          schema:
            type: integer
            format: int64
            default: 5
          example: 10
        - name: offset
          in: query
          required: false
          description: Number of feeds to skip before returning (for pagination)
          schema:
            type: integer
            format: int64
            default: 0
          example: 0
        - name: sort
          in: query
          required: false
          description: Sort order (e.g. `name,asc` or `id,desc`). Allowed properties are `name` and `id`.
          schema:
            type: string
          example: name,asc
      responses:
        '200':
          description: Paginated list of platform feeds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultPageListSentimentAnalysisFeed'
              example:
                data:
                  - id: c3d4e5f6-a7b8-9012-cdef-ab1234567890
                    name: twitter-brand-mentions
                    description: Platform-wide sentiment tracking for Twitter brand mentions
                    size: 128
                    maxSize: 5000
                errors: []
                metadata:
                  currentOffset: 0
                  totalCount: 1

  /platform-feeds/{id}:
    get:
      tags:
        - platform-feed
      summary: Retrieve a platform feed
      description: |
        Fetches the details of a platform-scoped feed by its ID, including name, description, current size, and maximum size.
      operationId: getPlatformFeed
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the platform feed. May be any unique string — not required to be a UUID.
          schema:
            type: string
          example: my-unique-feed-id-123
      responses:
        '200':
          description: Platform feed details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultSentimentAnalysisFeedVoid'
              example:
                data:
                  id: c3d4e5f6-a7b8-9012-cdef-ab1234567890
                  name: twitter-brand-mentions
                  description: Platform-wide sentiment tracking for Twitter brand mentions
                  size: 128
                  maxSize: 5000
                errors: []

  /platform-feeds/{id}/stats:
    get:
      tags:
        - platform-feed
      summary: Aggregate platform-feed statistics by time bucket
      description: |
        Returns a paginated list of time-bucketed rollups for the specified platform feed. Each item includes interval
        bounds (UTC), optional raw **sentiment** triples (**positive** / **negative** / **neutral** rollups: mean score,
        variance, sample counts), optional **sentimentDistribution** (row-mass-weighted **share** per label with approximate
        **range95** (approximate 95% share bounds) and **stdError** for shares when `basis` is `OK`), and per-**emotion** rollups for that interval.

        Query **`sentimentStats`** selects the representation: **`normalized`** (default)—`sentimentDistribution` only;
        **`raw`**—`sentiment` only; **`both`**—both. Use **granularity** for bucket size, optional **from** / **to** to bound
        the window, and **limit** / **offset** for pagination—the same semantics as the user-feed stats endpoints.
      operationId: getPlatformFeedStats
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the platform feed. May be any unique string — not required to be a UUID.
          schema:
            type: string
          example: my-unique-feed-id-123
        - name: granularity
          in: query
          required: false
          description: Size of each statistical interval (UTC bucket boundaries). When omitted, defaults to your tier’s configured granularity.
          schema:
            $ref: '#/components/schemas/StatGranularity'
          example: DAY
        - name: sentimentStats
          in: query
          required: false
          description: |
            Which sentiment-shaped fields appear on each interval row (default **`normalized`**). Responses should be
            treated as varying by this parameter for HTTP caching.
          schema:
            $ref: '#/components/schemas/SentimentStatsMode'
          example: normalized
        - name: from
          in: query
          required: false
          description: |
            Inclusive start of the query window (ISO-8601 `date-time`, UTC recommended; a calendar date `YYYY-MM-DD`
            alone is interpreted as 00:00:00 UTC that day). After plan limits (max history,
            `to` cap), the server aligns the window to **granularity** UTC buckets: snapped to bucket start, then clamped
            up to the policy floor if the snap would cross it. **LIFETIME** skips this bucket expansion.
          schema:
            type: string
            format: date-time
          example: "2025-04-01T00:00:00Z"
        - name: to
          in: query
          required: false
          description: |
            Exclusive end of the query window (half-open interval). A calendar date `YYYY-MM-DD` alone is interpreted as
            00:00:00 UTC that day. After plan limits, may expand to the next UTC bucket
            boundary for **granularity** unless capped by policy (e.g. current time for non-admin). **LIFETIME** skips this
            expansion. `WEEK` buckets begin Monday 00:00 UTC; `MONTH` begins the first calendar day 00:00 UTC.
          schema:
            type: string
            format: date-time
          example: "2025-04-08T00:00:00Z"
        - name: limit
          in: query
          required: false
          description: Maximum number of interval rows to return per page
          schema:
            type: integer
            format: int64
            default: 5
          example: 10
        - name: offset
          in: query
          required: false
          description: Number of interval rows to skip before returning results
          schema:
            type: integer
            format: int64
            default: 0
          example: 0
      responses:
        '200':
          description: Paginated list of combined sentiment and emotion rollups per interval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultPageListFeedIntervalStats'
              examples:
                normalized_default:
                  summary: Default — `sentimentDistribution` only
                  value:
                    data:
                      - interval:
                          from: "2025-04-07T00:00:00Z"
                          to: "2025-04-08T00:00:00Z"
                        sentimentDistribution:
                          basis: OK
                          positive:
                            share: 0.42
                            range95:
                              low: 0.38
                              high: 0.46
                            stdError: 0.0204
                            sampleCount: 220
                          negative:
                            share: 0.18
                            range95:
                              low: 0.14
                              high: 0.22
                            stdError: 0.0204
                            sampleCount: 95
                          neutral:
                            share: 0.40
                            range95:
                              low: 0.36
                              high: 0.44
                            stdError: 0.0204
                            sampleCount: 197
                        emotions:
                          - emotion: HAPPINESS
                            avgScore: 0.55
                            variance: 0.04
                            sampleCount: 512
                            segmentCount: 1
                          - emotion: ANTICIPATION
                            avgScore: 0.28
                            variance: 0.07
                            sampleCount: 140
                            segmentCount: 1
                    errors: []
                    metadata:
                      currentOffset: 0
                      totalCount: 22
                raw_only:
                  summary: "`sentimentStats=raw` — raw triple only"
                  value:
                    data:
                      - interval:
                          from: "2025-04-07T00:00:00Z"
                          to: "2025-04-08T00:00:00Z"
                        sentiment:
                          positive:
                            avgScore: 0.72
                            variance: 0.04
                            sampleCount: 220
                            segmentCount: 1
                          negative:
                            avgScore: 0.18
                            variance: 0.02
                            sampleCount: 95
                            segmentCount: 1
                          neutral:
                            avgScore: 0.55
                            variance: 0.06
                            sampleCount: 197
                            segmentCount: 1
                        emotions:
                          - emotion: HAPPINESS
                            avgScore: 0.55
                            variance: 0.04
                            sampleCount: 512
                            segmentCount: 1
                    errors: []
                    metadata:
                      currentOffset: 0
                      totalCount: 22
                both:
                  summary: "`sentimentStats=both`"
                  value:
                    data:
                      - interval:
                          from: "2025-04-07T00:00:00Z"
                          to: "2025-04-08T00:00:00Z"
                        sentiment:
                          positive:
                            avgScore: 0.72
                            variance: 0.04
                            sampleCount: 220
                            segmentCount: 1
                          negative:
                            avgScore: 0.18
                            variance: 0.02
                            sampleCount: 95
                            segmentCount: 1
                          neutral:
                            avgScore: 0.55
