                          high: 0.28
                        stdError: 0.0204
                        sampleCount: 120
                      neutral:
                        share: 0.40
                        range95:
                          low: 0.36
                          high: 0.44
                        stdError: 0.0204
                        sampleCount: 200
                errors: []
                metadata:
                  currentOffset: 0
                  totalCount: 6

components:
  schemas:
    AnalysisDomain:
      type: string
      description: |
        Selects the sentiment analysis model and output shape for this request.

        - **GENERAL** (default when omitted): Full analysis—sentiment label, confidence, primary emotions, rationale,
          and intent. Use for social posts, reviews, support tickets, and general text.
        - **FINANCIAL_NEWS**: Polarity-focused output for market tone (e.g. earnings, upgrades). Returns only sentiment
          label and confidence; emotions, rationale, and intent are omitted.
      enum:
        - GENERAL
        - FINANCIAL_NEWS

    AsyncModeHeaderValue:
      type: string
      description: |
        Value for the `X-WFT-Async-Mode` header on analysis `POST` operations that map to the async controller variant.
        Send **`true`** to request asynchronous processing (initial response contains a job id; poll job endpoints for results).
        For synchronous processing, omit this header or call the operation variant documented for synchronous bodies—see each path’s description.
      enum:
        - 'true'

    AnalyzeTextRequest:
      type: object
      description: Request payload for submitting text for sentiment analysis
      required:
        - text
      properties:
        correlationId:
          type: string
          maxLength: 128
          minLength: 0
          description: Optional client-provided identifier for correlating requests with external systems
        domain:
          $ref: '#/components/schemas/AnalysisDomain'
        text:
          type: string
          description: The text to analyze. Must be valid UTF-8. Supports all languages.
          minLength: 1
          example: This product changed my life – highly recommend!
        timestamp:
          type: string
          format: date-time
          description: Optional timestamp of the original text (e.g., when a review was posted). Defaults to the current time if omitted.
        topic:
          type: string
          maxLength: 512
          minLength: 0
          description: Optional topic or subject label to categorize the analysis
        weight:
          type: number
          format: double
          description: Optional weight to assign to this analysis entry within a feed (e.g., for weighted averages)

    CreateFeedRequest:
      type: object
      description: Request payload for creating a new sentiment analysis feed
      required:
        - name
      properties:
        id:
          type: string
          description: Optional client-provided identifier for the feed. If omitted, a UUID is generated automatically.
        name:
          type: string
          minLength: 1
          description: Human-readable name for the feed
        description:
          type: string
          description: Optional description of the feed's purpose or scope
        maxSize:
          type: integer
          format: int32
          minimum: 1
          description: Maximum number of analysis entries the feed can hold. Oldest entries may be evicted when the limit is reached.

    UpdateFeedRequest:
      type: object
      description: Request payload for updating an existing sentiment analysis feed
      properties:
        description:
          type: string
          description: Updated description of the feed's purpose or scope

    SentimentAnalysisFeed:
      type: object
      description: Represents a sentiment analysis feed used for grouping and tracking analyses
      properties:
        id:
          type: string
          description: Unique identifier of the feed
        name:
          type: string
          description: Human-readable name of the feed
        description:
          type: string
          description: Description of the feed's purpose or scope
        size:
          type: integer
          format: int32
          description: Current number of analysis entries in the feed
        maxSize:
          type: integer
          format: int32
          description: Maximum number of analysis entries the feed can hold

    Payload:
      type: object
      description: Contains the job ID returned after submission
      properties:
        jobId:
          type: string
          format: uuid
          description: Unique identifier of the created analysis job
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    SentimentAnalysisJobMetadata:
      type: object
      description: Metadata about a submitted sentiment analysis job
      properties:
        submittedTextLength:
          type: integer
          format: int32
          description: Character length of the submitted text

    PublicKeyInfo:
      type: object
      description: Encryption key and certificate metadata for the platform
      properties:
        certificatePem:
          type: string
          description: X.509 certificate in PEM-encoded format
        keyPem:
          type: string
          description: RSA public key in PEM-encoded format
        fingerprintSha256:
          type: string
          description: SHA-256 fingerprint of the certificate
        expires:
          type: string
          format: date-time
          description: Expiration date of the certificate

    WftError:
      type: object
      description: Represents an error returned by the API
      discriminator:
        propertyName: type
      required:
        - type
      properties:
        recoverable:
          type: boolean
          description: Indicates whether the error is recoverable (e.g., retryable)
        type:
          type: string
          description: Machine-readable error identifier
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          description: Additional context or validation errors

    WftWsResultSentimentAnalysisFeedVoid:
      type: object
      description: Standard wrapper for a sentiment analysis feed result
      properties:
        data:
          $ref: '#/components/schemas/SentimentAnalysisFeed'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    PagingUsageLimits:
      type: object
      description: Usage limit for maximum collection page size (`limit` query parameter)
      properties:
        maxAllowedPageSize:
          type: integer
          format: int64
          description: |
            Maximum allowed `limit` for paged reads. Matches the resolved access policy’s `maxAllowedPageSize`.

    WftWsResultPagingUsageLimitsVoid:
      type: object
      description: Standard wrapper for paging usage limit
      properties:
        data:
          $ref: '#/components/schemas/PagingUsageLimits'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    FeedMaxHistoryLimits:
      type: object
      description: Feed consumption limit for maximum queryable history window
      properties:
        maxHistoryDays:
          type: integer
          format: int64
          description: |
            Maximum history length in days for non-admin feed reads. **`<= 0`** means unlimited lookback (subject to
            other caps).

    FeedUsageLimits:
      type: object
      description: Combined feed consumption limits (history window and allowed stat granularities)
      properties:
        maxHistoryDays:
          type: integer
          format: int64
          description: Same semantics as `FeedMaxHistoryLimits.maxHistoryDays`.
        allowedGranularities:
          type: array
          items:
            $ref: '#/components/schemas/StatGranularity'
          description: Same semantics as `FeedAllowedGranularitiesLimits.allowedGranularities`.

    FeedAllowedGranularitiesLimits:
      type: object
      description: Feed consumption limit for allowed statistics bucket sizes
      properties:
        allowedGranularities:
          type: array
          items:
            $ref: '#/components/schemas/StatGranularity'
          description: Granularities allowed for non-admin feed stats queries (stable sort order is not guaranteed)

    WftWsResultFeedMaxHistoryLimitsVoid:
      type: object
      description: Standard wrapper for feed max-history usage limit
      properties:
        data:
          $ref: '#/components/schemas/FeedMaxHistoryLimits'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    WftWsResultFeedUsageLimitsVoid:
      type: object
      description: Standard wrapper for combined feed usage limits
      properties:
        data:
          $ref: '#/components/schemas/FeedUsageLimits'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    WftWsResultFeedAllowedGranularitiesLimitsVoid:
      type: object
      description: Standard wrapper for feed allowed-granularities usage limit
      properties:
        data:
          $ref: '#/components/schemas/FeedAllowedGranularitiesLimits'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    WftWsResultPayloadVoid:
      type: object
      description: Standard success response containing a job ID
      properties:
        data:
          $ref: '#/components/schemas/Payload'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    WftWsResultPayloadSentimentAnalysisJobMetadata:
      type: object
      description: Standard success response containing a job ID with sentiment analysis job metadata
      properties:
        data:
          $ref: '#/components/schemas/Payload'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata:
          $ref: '#/components/schemas/SentimentAnalysisJobMetadata'

    WftWsResultPublicKeyInfoVoid:
      type: object
      description: Standard wrapper for encryption key and certificate metadata
      properties:
        data:
          $ref: '#/components/schemas/PublicKeyInfo'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    EmotionLabel:
      type: string
      description: |
        Plutchik-style primary emotion label used in `emotionScores` and in feed statistics rollups.
        Values align with the API’s emotion taxonomy (see product contract).
      enum:
        - HAPPINESS
        - SADNESS
        - FEAR
        - ANGER
        - SURPRISE
        - DISGUST
        - CONTEMPT
        - ANTICIPATION

    EmotionScore:
      type: object
      description: A detected emotion with its confidence score
      properties:
        emotion:
          $ref: '#/components/schemas/EmotionLabel'
        score:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence that this emotion is present (0.0 = not present, 1.0 = strongly present)
        schema:
          $ref: '#/components/schemas/Schema'
        specificData:
          $ref: '#/components/schemas/SpecificData'

    EmotionIntervalStats:
      type: object
      description: Per-interval emotion rollup statistics for a feed (no combined sentiment summary)
      properties:
        interval:
          $ref: '#/components/schemas/IntervalBounds'
        emotions:
          type: array
          description: Rollup statistics for each detected emotion in this interval
          items:
            $ref: '#/components/schemas/EmotionRollupStats'

    EmotionRollupStats:
      type: object
      description: Aggregate statistics for a single emotion label within a time bucket
      properties:
        emotion:
          $ref: '#/components/schemas/EmotionLabel'
        avgScore:
          type: number
          format: double
          description: Mean score for this emotion in the interval
        variance:
          type: number
          format: double
          description: Variance of scores across samples in the interval
        sampleCount:
          type: integer
          format: int64
          description: Number of underlying emotion score samples
        segmentCount:
          type: integer
          format: int64
          description: Number of segments or buckets aggregated into this rollup

    SentimentStatsMode:
      type: string
      description: |
        Which sentiment fields each interval row includes for combined stats (`GET .../stats`) and sentiment-only stats
        (`GET .../stats/sentiment`). HTTP caches should vary by this query parameter (or disable caching) so clients never
        mix representations.
      enum:
        - normalized
        - raw
        - both
      default: normalized

    SentimentDistributionBasis:
      type: string
      description: Whether normalized **share**, **range95**, and **stdError** are defined for the bucket.
      enum:
        - NO_MASS
        - ALL_SCORES_ZERO
        - OK

    Range95:
      type: object
      description: |
        Approximate **95% range** for the **estimated share** (Normal interval, clipped to `[0, 1]`). Serialized as
        property **`range95`** on `SentimentDistributionLabelStats`.
      properties:
        low:
          type: number
          format: double
        high:
          type: number
          format: double

    SentimentDistributionLabelStats:
      type: object
      description: |
        Per-label normalized **share** (row-mass-weighted mean contribution / sum across labels), plus approximate
        **95% range** (`range95`), **std. error** (`stdError`), and **sampleCount** (raw rows in that label’s outer rollup)
        for that share when `basis` is **OK** (not raw `RollupStats.variance`).
      properties:
        share:
          type: number
          format: double
        range95:
          $ref: '#/components/schemas/Range95'
        stdError:
          type: number
          format: double
        sampleCount:
          type: integer
          format: int64
          description: Raw analysis rows in the bucket for this label (same meaning as `RollupStats.sampleCount` on the raw sentiment arm).

    SentimentDistributionStats:
      type: object
      description: Normalized sentiment mass distribution across positive / negative / neutral for the bucket.
      properties:
        basis:
          $ref: '#/components/schemas/SentimentDistributionBasis'
        positive:
          $ref: '#/components/schemas/SentimentDistributionLabelStats'
        negative:
          $ref: '#/components/schemas/SentimentDistributionLabelStats'
        neutral:
          $ref: '#/components/schemas/SentimentDistributionLabelStats'

    FeedIntervalStats:
      type: object
      description: |
        Full combined rollup for one time bucket: optional raw **sentiment** triple, optional **sentimentDistribution**
        (normalized shares + **range95** / **stdError**), and per-emotion breakdown. Which sentiment fields appear is controlled by query
        **`sentimentStats`** (default **`normalized`** = distribution only).
      properties:
        interval:
          $ref: '#/components/schemas/IntervalBounds'
        sentiment:
          $ref: '#/components/schemas/SentimentTripleStats'
          description: Present when `sentimentStats` is `raw` or `both`; omitted or null when `normalized`.
        sentimentDistribution:
          $ref: '#/components/schemas/SentimentDistributionStats'
          description: Present when `sentimentStats` is `normalized` (default) or `both`; omitted or null when `raw` only.
        emotions:
          type: array
          description: Per-emotion rollups for the same interval
          items:
            $ref: '#/components/schemas/EmotionRollupStats'

    IntervalBounds:
      type: object
      description: UTC half-open interval `[from, to)` for a statistics bucket
      properties:
        from:
          type: string
          format: date-time
          description: Inclusive start of the interval
        to:
          type: string
          format: date-time
          description: Exclusive end of the interval

    RollupStats:
      type: object
      description: Numeric rollup (mean, variance, counts) for one emotion label or one sentiment label track in an interval
      properties:
        avgScore:
          type: number
          format: double
          description: Mean normalized score in the bucket
        variance:
          type: number
          format: double
          description: Variance of scores in the bucket
        sampleCount:
          type: integer
          format: int64
          description: Number of score samples contributing to the rollup
        segmentCount:
          type: integer
          format: int64
          description: Number of logical segments aggregated (implementation-specific)

    SentimentIntervalStats:
      type: object
      description: |
        Per-interval sentiment payload (no per-emotion list). Raw **sentiment** and/or **sentimentDistribution** per
        **`sentimentStats`** (default **`normalized`**).
      properties:
        interval:
          $ref: '#/components/schemas/IntervalBounds'
        sentiment:
          $ref: '#/components/schemas/SentimentTripleStats'
          description: Present when `sentimentStats` is `raw` or `both`.
        sentimentDistribution:
          $ref: '#/components/schemas/SentimentDistributionStats'
          description: Present when `sentimentStats` is `normalized` (default) or `both`.

    SentimentTripleStats:
      type: object
      description: |
        Parallel rollups for analyses labeled **positive**, **negative**, or **neutral** in the interval. Each track’s
        `sampleCount` counts only rows with that label; analyses with no sentiment label do not contribute to any track.
        Unused tracks report zero mean and variance with `sampleCount` 0.
      required:
        - positive
        - negative
        - neutral
      properties:
        positive:
          $ref: '#/components/schemas/RollupStats'
        negative:
          $ref: '#/components/schemas/RollupStats'
        neutral:
          $ref: '#/components/schemas/RollupStats'

    StatGranularity:
      type: string
      description: |
        Allowed values for the `granularity` query parameter on feed statistics endpoints. Each value selects the
        width of a UTC-aligned time bucket used to aggregate sentiment and emotion scores.

        - **HOUR** — one bucket per clock hour
        - **DAY** — one bucket per calendar day
        - **WEEK** — one bucket per calendar week
        - **MONTH** — one bucket per calendar month
        - **LIFETIME** — a single bucket for the full feed (entire requested or available range)
      enum:
        - HOUR
        - DAY
        - WEEK
        - MONTH
        - LIFETIME

    IntentCategory:
      type: string
      description: |
        High-level intent inferred from the submitted text (e.g. praise vs complaint). The classifier may return
        **UNKNOWN** when intent is unclear.
      enum:
        - COMPLAINT
        - PRAISE
        - INQUIRY
        - SUGGESTION
        - REQUEST
        - NEUTRAL
        - UNKNOWN

    SentimentCategory:
      type: string
      description: |
        Discrete overall sentiment label. **MIXED** indicates strongly conflicting signals; **UNCERTAIN** indicates
        low confidence or borderline polarity.
      enum:
        - VERY_NEGATIVE
        - NEGATIVE
        - SLIGHTLY_NEGATIVE
        - NEUTRAL
        - SLIGHTLY_POSITIVE
        - POSITIVE
        - VERY_POSITIVE
        - MIXED
        - UNCERTAIN

    SentimentAnalysis:
      type: object
      description: Complete result of sentiment analysis
      properties:
        id:
          type: string
          description: Unique identifier (UUID) of this analysis result
        intent:
          $ref: '#/components/schemas/IntentCategory'
        intentScore:
          type: number
          format: double
          description: Confidence score for the detected intent (0.0 – 1.0)
        sentiment:
          $ref: '#/components/schemas/SentimentCategory'
        sentimentScore:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Confidence score for the detected sentiment (0.0 – 1.0)
        emotionScores:
          type: array
          description: Per-emotion confidence scores
          items:
            $ref: '#/components/schemas/EmotionScore'
        rationale:
          type: string
          description: Human-readable explanation of the sentiment decision (optional)
        inputTimestamp:
          type: string
          format: date-time
          description: Timestamp of the original input text (if provided in the request)
        schema:
          $ref: '#/components/schemas/Schema'
        specificData:
          $ref: '#/components/schemas/SpecificData'

    WftWsResultSentimentAnalysisVoid:
      type: object
      description: Standard wrapper for a completed sentiment analysis result
      properties:
        data:
          $ref: '#/components/schemas/SentimentAnalysis'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}

    WftWsResultPageListSentimentAnalysis:
      type: object
      description: Paginated list of sentiment analysis results with collection metadata and navigation links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SentimentAnalysis'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata:
          $ref: '#/components/schemas/WftWsCollectionResultMeta'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    WftWsResultPageListSentimentAnalysisFeed:
      type: object
      description: Paginated list of sentiment analysis feeds with collection metadata and navigation links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SentimentAnalysisFeed'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata:
          $ref: '#/components/schemas/WftWsCollectionResultMeta'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    WftWsResultPageListEmotionIntervalStats:
      type: object
      description: Paginated list of emotion-only interval statistics with collection metadata and navigation links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmotionIntervalStats'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata:
          $ref: '#/components/schemas/WftWsCollectionResultMeta'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    WftWsResultPageListFeedIntervalStats:
      type: object
      description: Paginated list of combined feed interval statistics (sentiment + emotions) with collection metadata and navigation links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeedIntervalStats'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata:
          $ref: '#/components/schemas/WftWsCollectionResultMeta'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    WftWsResultPageListSentimentIntervalStats:
      type: object
      description: Paginated list of sentiment-only interval statistics with collection metadata and navigation links
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SentimentIntervalStats'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata:
          $ref: '#/components/schemas/WftWsCollectionResultMeta'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    WftWsCollectionResultMeta:
      type: object
      description: Pagination metadata for collection results
      properties:
        currentOffset:
          type: integer
          format: int64
          description: The current offset position in the result set
        totalCount:
          type: integer
          format: int64
          description: Total number of items matching the query

    Link:
      type: object
      description: Hypermedia link for navigating paginated results
      properties:
        href:
          type: string
          description: The URL of the linked resource
        hreflang:
          type: string
          description: Language of the linked resource
        title:
          type: string
          description: Human-readable title for the link
        type:
          type: string
          description: Media type of the linked resource
        deprecation:
          type: string
          description: URL indicating the deprecation status of the link
        profile:
          type: string
          description: URI of the profile describing the linked resource
        name:
          type: string
          description: Name of the link relation
        templated:
          type: boolean
          description: Whether the href is a URI template

    Progress:
      type: object
      description: Represents the progress state of a job stage
      properties:
        details: {}
        percentCompleted:
          type: number
          format: double
          description: Percentage of completion for this stage (0.0 – 100.0)
        stageId:
          $ref: '#/components/schemas/Stage'

    Stage:
      description: Identifier for a job processing stage
      type: object

    JobProcessingStatus:
      type: string
      description: |
        Lifecycle state of an asynchronous job returned by `/system/jobs/{id}` and related endpoints.
        Poll until **SUCCEEDED** (then read `resultId`) or **FAILED** / **CANCELED** for terminal error handling.
      enum:
        - CANCELED
        - FAILED
        - PENDING
        - PROCESSING
        - SUCCEEDED

    SysJobState:
      type: object
      description: Complete state of an asynchronous system job
      required:
        - owner
        - type
      properties:
        type:
          type: string
          description: Type of the job (e.g., SENTIMENT_ANALYSIS)
        resultId:
          type: string
          format: uuid
          description: UUID of the result produced by this job (available when status is SUCCEEDED)
        owner:
          $ref: '#/components/schemas/WftMtUser'
        progressTracking:
          $ref: '#/components/schemas/WftProgressTracking'
        status:
          $ref: '#/components/schemas/JobProcessingStatus'
        ownerId:
          type: string
          description: Identifier of the job owner
        tenantId:
          type: string
          description: Identifier of the tenant that owns this job

    WftMtUser:
      type: object
      description: Represents the owner of a job or resource
      properties:
        tenantId:
          type: string
          description: Identifier of the tenant
        userId:
          type: string
          description: Identifier of the user

    WftProgressTracking:
      type: object
      description: Tracks the progress of a multi-stage job
      properties:
        progressStack:
          type: array
          items:
            $ref: '#/components/schemas/Progress'
          description: Stack of progress entries for nested stages
        overallProgress:
          $ref: '#/components/schemas/Progress'

    WftWsResultSysJobStateVoid:
      type: object
      description: Standard wrapper for a system job state result
      properties:
        data:
          $ref: '#/components/schemas/SysJobState'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WftError'
        metadata: {}
