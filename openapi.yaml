                            sampleCount: 197
                            segmentCount: 1
                        sentimentDistribution:
                          basis: OK
                          positive:
                            share: 0.42
                            range95:
                              low: 0.38
                              high: 0.46
                            stdError: 0.0204
                            sampleCount: 220
                          negative:
                            share: 0.18
                            range95:
                              low: 0.14
                              high: 0.22
