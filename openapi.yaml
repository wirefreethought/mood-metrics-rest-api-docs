  /platform-feeds/{id}/stats/emotions:
    get:
      tags:
        - platform-feed
      summary: Emotion-only statistics for a platform feed by time bucket
      description: |
        Same behavior as `GET /platform-feeds/{id}/stats`, but each row lists **emotion** rollups only—ideal when you
        plot several emotions independently across time.
      operationId: getPlatformFeedEmotionStats
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the platform feed. May be any unique string — not required to be a UUID.
          schema:
            type: string
          example: my-unique-feed-id-123
        - name: granularity
          in: query
          required: false
          description: Size of each statistical interval (UTC bucket boundaries). When omitted, defaults to your tier’s configured granularity.
          schema:
            $ref: '#/components/schemas/StatGranularity'
          example: DAY
        - name: from
          in: query
          required: false
          description: |
            Inclusive start of the query window (ISO-8601 `date-time`, UTC recommended; a calendar date `YYYY-MM-DD`
            alone is interpreted as 00:00:00 UTC that day). After plan limits (max history,
            `to` cap), the server aligns the window to **granularity** UTC buckets: snapped to bucket start, then clamped
            up to the policy floor if the snap would cross it. **LIFETIME** skips this bucket expansion.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: |
            Exclusive end of the query window (half-open interval). A calendar date `YYYY-MM-DD` alone is interpreted as
            00:00:00 UTC that day. After plan limits, may expand to the next UTC bucket
            boundary for **granularity** unless capped by policy (e.g. current time for non-admin). **LIFETIME** skips this
            expansion. `WEEK` buckets begin Monday 00:00 UTC; `MONTH` begins the first calendar day 00:00 UTC.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Maximum number of interval rows to return per page
          schema:
            type: integer
            format: int64
            default: 5
        - name: offset
          in: query
          required: false
          description: Number of interval rows to skip before returning results
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: Paginated list of per-emotion rollups per interval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultPageListEmotionIntervalStats'
              example:
                data:
                  - interval:
                      from: "2025-04-07T00:00:00Z"
                      to: "2025-04-08T00:00:00Z"
                    emotions:
                      - emotion: HAPPINESS
                        avgScore: 0.62
                        variance: 0.03
                        sampleCount: 301
                        segmentCount: 1
                      - emotion: DISGUST
                        avgScore: 0.08
                        variance: 0.01
                        sampleCount: 44
                        segmentCount: 1
                errors: []
                metadata:
                  currentOffset: 0
                  totalCount: 22

  /platform-feeds/{id}/stats/sentiment:
    get:
      tags:
        - platform-feed
      summary: Sentiment-only statistics for a platform feed by time bucket
      description: |
        Same time bucketing as `GET /platform-feeds/{id}/stats`, but each row has no per-emotion array. **`sentimentStats`**
        controls whether rows include **`sentimentDistribution`** (default), raw **`sentiment`**, or **both** (see combined
        stats endpoint).
      operationId: getPlatformFeedSentimentStats
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the platform feed. May be any unique string — not required to be a UUID.
          schema:
            type: string
          example: my-unique-feed-id-123
        - name: granularity
          in: query
          required: false
          description: Size of each statistical interval (UTC bucket boundaries). When omitted, defaults to your tier’s configured granularity.
          schema:
            $ref: '#/components/schemas/StatGranularity'
          example: MONTH
        - name: sentimentStats
          in: query
          required: false
          description: Same as combined stats — default **`normalized`** (`sentimentDistribution` only).
          schema:
            $ref: '#/components/schemas/SentimentStatsMode'
          example: normalized
        - name: from
          in: query
          required: false
          description: |
            Inclusive start of the query window (ISO-8601 `date-time`, UTC recommended; a calendar date `YYYY-MM-DD`
            alone is interpreted as 00:00:00 UTC that day). After plan limits (max history,
            `to` cap), the server aligns the window to **granularity** UTC buckets: snapped to bucket start, then clamped
            up to the policy floor if the snap would cross it. **LIFETIME** skips this bucket expansion.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: |
            Exclusive end of the query window (half-open interval). A calendar date `YYYY-MM-DD` alone is interpreted as
            00:00:00 UTC that day. After plan limits, may expand to the next UTC bucket
            boundary for **granularity** unless capped by policy (e.g. current time for non-admin). **LIFETIME** skips this
            expansion. `WEEK` buckets begin Monday 00:00 UTC; `MONTH` begins the first calendar day 00:00 UTC.
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Maximum number of interval rows to return per page
          schema:
            type: integer
            format: int64
            default: 5
        - name: offset
          in: query
          required: false
          description: Number of interval rows to skip before returning results
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '200':
          description: Paginated list of sentiment rollups per interval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultPageListSentimentIntervalStats'
              examples:
                normalized_default:
                  summary: Default — distribution only
                  value:
                    data:
                      - interval:
                          from: "2025-03-01T00:00:00Z"
                          to: "2025-04-01T00:00:00Z"
                        sentimentDistribution:
                          basis: OK
                          positive:
                            share: 0.35
                            range95:
                              low: 0.31
                              high: 0.39
                            stdError: 0.0204
                            sampleCount: 1200
                          negative:
                            share: 0.22
                            range95:
                              low: 0.18
                              high: 0.26
                            stdError: 0.0204
                            sampleCount: 800
                          neutral:
                            share: 0.43
                            range95:
                              low: 0.39
                              high: 0.47
                            stdError: 0.0204
                            sampleCount: 600
                    errors: []
                    metadata:
                      currentOffset: 0
                      totalCount: 3
                raw_only:
                  summary: Raw triple
                  value:
                    data:
                      - interval:
                          from: "2025-03-01T00:00:00Z"
                          to: "2025-04-01T00:00:00Z"
                        sentiment:
                          positive:
                            avgScore: 0.58
                            variance: 0.05
                            sampleCount: 1200
                            segmentCount: 1
                          negative:
                            avgScore: 0.22
                            variance: 0.03
                            sampleCount: 800
                            segmentCount: 1
                          neutral:
                            avgScore: 0.48
                            variance: 0.08
                            sampleCount: 2021
                            segmentCount: 1
                    errors: []
                    metadata:
                      currentOffset: 0
                      totalCount: 3

  /usage/limits/paging:
    get:
      tags:
        - usage
      summary: Maximum page size (limit) for collection paging
      description: |
        Returns **`maxAllowedPageSize`** from the resolved access policy—the maximum **`limit`** query parameter value
        accepted on paged collection endpoints when max page-size policy is enabled server-side.

        **Authentication is optional.** Unauthenticated requests use the **default** access policy when no tier-specific
        resolvers match request headers.
      operationId: getPagingUsageLimits
      security: []
      responses:
        '200':
          description: Plan limit for paged query size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultPagingUsageLimitsVoid'
              example:
                data:
                  maxAllowedPageSize: 10
                errors: []

  /usage/limits/feed:
    get:
      tags:
        - usage
      summary: Combined feed usage limits for your plan
      description: |
        Returns **`maxHistoryDays`** and **`allowedGranularities`** from the resolved access policy in one response—the
        same values as `GET /usage/limits/feed/history` and `GET /usage/limits/feed/granularity`.

        **Authentication is optional.** Unauthenticated requests use the **default** access policy when no tier-specific
        resolvers match request headers.

        **Admin:** values reflect **configured plan metadata**; admins may still query outside these bounds where the API
        allows.
      operationId: getFeedUsageLimits
      security: []
      responses:
        '200':
          description: Combined feed history and granularity limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultFeedUsageLimitsVoid'
              example:
                data:
                  maxHistoryDays: 30
                  allowedGranularities:
                    - DAY
                    - LIFETIME
                errors: []

  /usage/limits/feed/history:
    get:
      tags:
        - usage
      summary: Maximum feed history window (days) for your plan
      description: |
        Returns **`maxHistoryDays`** from the resolved access policy—the same cap applied to feed-backed reads and
        statistics time windows for **non-admin** principals. **`maxHistoryDays <= 0`** means unlimited lookback (still
        subject to other policy caps such as “to” not beyond now).

        **Authentication is optional.** Unauthenticated requests use the **default** access policy when no tier-specific
        resolvers match request headers.

        **Admin:** this endpoint reflects **configured plan metadata**; admins may still query outside these bounds where
        the API allows (e.g. broader history on stats).
      operationId: getFeedUsageLimitsHistory
      security: []
      responses:
        '200':
          description: Plan limit for feed history window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultFeedMaxHistoryLimitsVoid'
              example:
                data:
                  maxHistoryDays: 30
                errors: []

  /usage/limits/feed/granularity:
    get:
      tags:
        - usage
      summary: Allowed stat granularities for your plan
      description: |
        Returns **`allowedGranularities`** from the resolved access policy—the same allowlist enforced for **non-admin**
        feed statistics queries.

        **Authentication is optional**; anonymous callers receive **default** deployment limits.

        **Admin:** this list reflects plan configuration; admins may still request granularities **outside** this list on
        stats endpoints where the API grants an admin bypass.
      operationId: getFeedUsageLimitsGranularity
      security: []
      responses:
        '200':
          description: Allowed stat granularities for feed consumption
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WftWsResultFeedAllowedGranularitiesLimitsVoid'
              example:
                data:
                  allowedGranularities:
                    - DAY
                    - WEEK
                    - MONTH
                    - LIFETIME
                errors: []

  /system/encryption/info:
    get:
      tags:
        - encryption
      summary: Retrieve encryption metadata
      description: |
        Returns metadata about the platform's current encryption configuration, including the public key,
        certificate, SHA-256 fingerprint, and key expiration date.
      operationId: getEncryptionInfo
      responses:
        '200':
          description: Encryption configuration metadata
